<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>小時候打卡系統</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: "Microsoft JhengHei", Arial, sans-serif;
      background: #f6f8f4;
      color: #243529;
    }

    .wrap {
      max-width: 480px;
      margin: 0 auto;
      padding: 18px;
    }

    .header {
      text-align: center;
      padding: 18px 0 10px;
    }

    .brand {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 2px;
      margin-bottom: 6px;
      color: #254b2f;
    }

    .subtitle {
      font-size: 14px;
      color: #6f7d72;
    }

    .card {
      background: #fffef9;
      border-radius: 22px;
      padding: 20px;
      box-shadow: 0 10px 28px rgba(37, 75, 47, 0.08);
      border: 1px solid rgba(37, 75, 47, 0.12);
      margin-bottom: 16px;
    }

    .status {
      background: #f2f6ef;
      border-radius: 16px;
      padding: 16px;
      font-size: 15px;
      line-height: 1.8;
      white-space: pre-line;
      word-break: break-word;
      margin-bottom: 16px;
      color: #243529;
      border: 1px solid rgba(37, 75, 47, 0.08);
    }

    .section-title {
      font-size: 15px;
      font-weight: 800;
      color: #254b2f;
      margin: 8px 0 10px;
    }

    input {
      width: 100%;
      padding: 15px;
      border-radius: 14px;
      border: 1px solid #cbd8c8;
      font-size: 16px;
      margin-bottom: 10px;
      outline: none;
      background: #fff;
    }

    input:focus {
      border-color: #254b2f;
      box-shadow: 0 0 0 3px rgba(37, 75, 47, 0.12);
    }

    button {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 16px;
      margin: 7px 0;
      font-size: 17px;
      font-weight: 900;
      color: #fff;
      background: #254b2f;
      cursor: pointer;
    }

    button:active {
      transform: scale(0.99);
    }

    button:disabled {
      background: #aaa !important;
      cursor: not-allowed;
    }

    .btn-main {
      background: #254b2f;
    }

    .btn-bind {
      background: #6f7d72;
    }

    .hidden {
      display: none;
    }

    .tips {
      font-size: 13px;
      color: #78857b;
      line-height: 1.6;
      text-align: center;
      margin-top: 10px;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      color: #9aa39a;
      margin-top: 12px;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="header">
      <div class="brand">小時候打卡系統</div>
      <div class="subtitle">員工上下班・休息紀錄</div>
    </div>

    <div class="card">
      <div id="status" class="status">系統載入中...</div>

      <div id="bindBox" class="hidden">
        <div class="section-title">第一次使用｜綁定員工UID</div>
        <input id="employeeId" type="text" placeholder="請輸入員工UID (電話號碼)">
        <button class="btn-bind" onclick="bindEmployee()">綁定員工資料</button>
      </div>

      <div id="homeBox" class="hidden">
        <div class="section-title">請從 LINE 下方選單操作</div>
        <button class="btn-main" onclick="sendClock('上班打卡')">上班打卡</button>
        <button class="btn-main" onclick="sendClock('下班打卡')">下班打卡</button>
        <button class="btn-main" onclick="sendClock('休息開始')">開始休息</button>
        <button class="btn-main" onclick="sendClock('休息結束')">結束休息</button>
      </div>

      <div class="tips">
        打卡時會使用手機定位確認是否在分店範圍內
      </div>
    </div>

    <div class="footer">
      LIFF ID：2010226307-AZeYYFbb
    </div>
  </div>

  <script>
    const LIFF_ID = '2010226307-AZeYYFbb';

    const API_URL = 'https://script.google.com/macros/s/AKfycbyMjNZ6Tzl7cm6v43JYrbI5UCnQcwdqMG9bfJ3sv5HDkgKPe6yDnF1khfJu4asbrFjc/exec';

    let lineUserId = '';
    let lineDisplayName = '';
    let lastActionType = '';

    window.onload = async function () {
      setStatus('正在啟動打卡系統...');

      try {
        if (typeof liff === 'undefined') {
          setStatus('LIFF SDK 載入失敗，請重新開啟 LINE');
          return;
        }

        await liff.init({
          liffId: LIFF_ID,
          withLoginOnExternalBrowser: true
        });

        if (!liff.isLoggedIn()) {
          setStatus('尚未登入 LINE，正在前往登入...');
          liff.login();
          return;
        }

        const profile = await liff.getProfile();

        lineUserId = profile.userId;
        lineDisplayName = profile.displayName;

        handleRoute();

      } catch (err) {
        setStatus(
          '初始化失敗\n\n' +
          '錯誤訊息：' + err.message + '\n\n' +
          '請確認 LIFF Endpoint URL 是否正確'
        );
      }
    };

    function getUrlParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    function hideAllBoxes() {
      document.getElementById('bindBox').classList.add('hidden');
      document.getElementById('homeBox').classList.add('hidden');
    }

    function handleRoute() {
      const action = getUrlParam('action');

      hideAllBoxes();

      if (action === 'workIn') {
        sendClock('上班打卡');
        return;
      }

      if (action === 'workOut') {
        sendClock('下班打卡');
        return;
      }

      if (action === 'breakStart') {
        sendClock('休息開始');
        return;
      }

      if (action === 'breakEnd') {
        sendClock('休息結束');
        return;
      }

      if (action === 'monthRecords') {
        getMonthRecords();
        return;
      }

      if (action === 'historyRecords') {
        getHistoryRecords();
        return;
      }

      document.getElementById('homeBox').classList.remove('hidden');

      setStatus(
        'LINE 身分取得成功\n' +
        'LINE 名稱：' + lineDisplayName + '\n\n' +
        '請從 LINE 下方選單選擇打卡項目'
      );
    }

    function showBindRequired(type) {
      hideAllBoxes();

      lastActionType = type || '';

      document.getElementById('bindBox').classList.remove('hidden');

      setStatus(
        '尚未綁定員工UID\n\n' +
        'LINE 名稱：' + lineDisplayName + '\n\n' +
        '請先輸入員工UID完成綁定。\n' +
        '綁定成功後，請再點一次「' + type + '」。'
      );
    }

    function bindEmployee() {
      const employeeId = document.getElementById('employeeId').value.trim();

      if (!employeeId) {
        setStatus('請先輸入員工UID');
        return;
      }

      if (!lineUserId) {
        setStatus('尚未取得 LINE userId，請重新開啟頁面');
        return;
      }

      setButtons(false);
      setStatus('正在綁定員工資料...');

      apiCall({
        action: 'bindEmployee',
        userId: lineUserId,
        employeeId: employeeId
      }, function (res) {
        setButtons(true);

        if (res.ok) {
          hideAllBoxes();

          document.getElementById('homeBox').classList.remove('hidden');

          setStatus(
            '綁定成功\n\n' +
            '姓名：' + res.name + '\n' +
            '可打卡分店：' + res.allowedStores + '\n\n' +
            '請回 LINE 下方選單，再點一次要執行的打卡項目。'
          );

        } else {
          setStatus(res.message || '綁定失敗');
        }
      });
    }

    function sendClock(type) {
      if (!lineUserId) {
        setStatus('尚未取得 LINE userId，請重新開啟頁面');
        return;
      }

      lastActionType = type;

      hideAllBoxes();

      setButtons(false);
      setStatus(
        'LINE 名稱：' + lineDisplayName + '\n\n' +
        '正在確認員工資料...'
      );

      apiCall({
        action: 'checkEmployee',
        userId: lineUserId
      }, function (preCheck) {
        if (!preCheck.ok && String(preCheck.message || '').includes('尚未綁定')) {
          setButtons(true);
          showBindRequired(type);
          return;
        }

        if (!preCheck.ok) {
          setButtons(true);
          setStatus(preCheck.message || '員工資料檢查失敗');
          return;
        }

        startGeoClock(type);
      });
    }

    function startGeoClock(type) {
      setButtons(false);
      setStatus('正在取得手機定位...\n請允許定位權限');

      if (!navigator.geolocation) {
        setButtons(true);
        setStatus('此手機不支援定位功能');
        return;
      }

      navigator.geolocation.getCurrentPosition(
        function (position) {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;

          setStatus(
            '定位成功\n' +
            '正在送出：' + type
          );

          apiCall({
            action: 'clockIn',
            userId: lineUserId,
            type: type,
            lat: lat,
            lng: lng
          }, function (res) {
            setButtons(true);

            if (res.ok) {
              setStatus(
                res.message + '\n\n' +
                '姓名：' + res.name + '\n' +
                '分店：' + res.store + '\n' +
                '日期：' + res.date + '\n' +
                '時間：' + res.time + '\n\n' +
                '畫面即將自動關閉...'
              );

              closeLiffAfterSuccess();

            } else {
              if (String(res.message || '').includes('尚未綁定')) {
                showBindRequired(type);
              } else {
                setStatus(res.message || '打卡失敗');
              }
            }
          });
        },
        function (error) {
          setButtons(true);

          let msg = '定位失敗';

          if (error.code === 1) {
            msg = '你拒絕了定位權限，無法打卡';
          } else if (error.code === 2) {
            msg = '無法取得目前位置';
          } else if (error.code === 3) {
            msg = '定位逾時，請再試一次';
          }

          setStatus(msg);
        },
        {
          enableHighAccuracy: true,
          timeout: 15000,
          maximumAge: 0
        }
      );
    }

    function getMonthRecords() {
      if (!lineUserId) {
        setStatus('尚未取得 LINE userId，請重新開啟頁面');
        return;
      }

      hideAllBoxes();
      setButtons(false);
      setStatus('正在查詢本月打卡紀錄...');

      apiCall({
        action: 'getMonthRecords',
        userId: lineUserId
      }, function (res) {
        setButtons(true);

        if (!res.ok) {
          setStatus(res.message || '查詢本月紀錄失敗');
          return;
        }

        setStatus(formatGroupedRecordsText('本月打卡紀錄', res.records || []));
      });
    }

    function getHistoryRecords() {
      if (!lineUserId) {
        setStatus('尚未取得 LINE userId，請重新開啟頁面');
        return;
      }

      hideAllBoxes();
      setButtons(false);
      setStatus('正在查詢歷史打卡紀錄...');

      apiCall({
        action: 'getHistoryRecords',
        userId: lineUserId
      }, function (res) {
        setButtons(true);

        if (!res.ok) {
          setStatus(res.message || '查詢歷史紀錄失敗');
          return;
        }

        setStatus(formatGroupedRecordsText('歷史打卡紀錄', res.records || []));
      });
    }

    function formatGroupedRecordsText(title, records) {
  records = records || [];

  records = records.filter(function (r) {
    const result = getField(r, ['result', '狀態']);
    return result === '成功' || result === '補卡';
  });

  if (records.length === 0) {
    return title + '\n\n目前沒有紀錄';
  }

  const map = {};
      records.forEach(function (r) {
        const date = getField(r, ['date', '日期']);
        const store = getField(r, ['store', '分店']);
        const type = getField(r, ['type', '類型', '動作']);
        const time = getField(r, ['time', '時間']);
        const result = getField(r, ['result', '狀態']);

        const key = date + '_' + store;

        if (!map[key]) {
          map[key] = {
            date: date,
            store: store,
            workIn: '',
            breakStart: '',
            breakEnd: '',
            workOut: '',
            result: result,
            hours: ''
          };
        }

        if (type === '上班打卡') {
          map[key].workIn = time;
        } else if (type === '休息開始') {
          map[key].breakStart = time;
        } else if (type === '休息結束') {
          map[key].breakEnd = time;
        } else if (type === '下班打卡') {
          map[key].workOut = time;
        }

        if (result) {
          map[key].result = result;
        }
      });

      const days = Object.values(map);

      days.sort(function (a, b) {
        return String(b.date).localeCompare(String(a.date));
      });

const workDaySet = new Set();
let totalHours = 0;

days.forEach(function (d) {
  if (d.workIn || d.workOut) {
    workDaySet.add(String(d.date || '').trim());
  }

  if (d.workIn && d.workOut) {
    d.hours = calcWorkHours(d.workIn, d.workOut, d.breakStart, d.breakEnd);
  } else {
    d.hours = '';
  }

  const h = parseFloat(d.hours);

  if (!isNaN(h)) {
    totalHours += h;
  }
});

const workDays = workDaySet.size;

      let text =
        title + '\n\n' +
        '上班天數：' + workDays + ' 天\n' +
        '總工時：' + formatHour(totalHours) + ' 小時\n\n';

      days.forEach(function (d, index) {
        text +=
          (index + 1) + '. ' + (d.date || '-') + '\n' +
          '分店：' + (d.store || '-') + '\n' +
          '上班打卡：' + formatTime(d.workIn) + '\n' +
          '休息開始：' + formatTime(d.breakStart) + '\n' +
          '休息結束：' + formatTime(d.breakEnd) + '\n' +
          '下班打卡：' + formatTime(d.workOut) + '\n' +
          '工時：' + (d.hours !== '' ? formatHour(d.hours) + ' 小時' : '-') + '\n\n';
      });

      return text.trim();
    }

    function calcWorkHours(workIn, workOut, breakStart, breakEnd) {
      const inMin = roundedTimeToMinutes(workIn);
      const outMin = roundedTimeToMinutes(workOut);

      if (inMin === null || outMin === null) {
        return '';
      }

      let total = outMin - inMin;

      if (total < 0) {
        total += 24 * 60;
      }

      const bsMin = roundedTimeToMinutes(breakStart);
      const beMin = roundedTimeToMinutes(breakEnd);

      if (bsMin !== null && beMin !== null) {
        let breakTotal = beMin - bsMin;

        if (breakTotal < 0) {
          breakTotal += 24 * 60;
        }

        total -= breakTotal;
      }

      if (total < 0) {
        total = 0;
      }

      return Math.round((total / 60) * 100) / 100;
    }

    function roundedTimeToMinutes(timeText) {
      const parsed = parseTimeParts(timeText);

      if (!parsed) {
        return null;
      }

      let h = parsed.h;
      const m = parsed.m;

      let roundedMinute = 0;

      if (m >= 0 && m <= 15) {
        roundedMinute = 0;
      } else if (m >= 16 && m <= 45) {
        roundedMinute = 30;
      } else if (m >= 46 && m <= 59) {
        h += 1;
        roundedMinute = 0;
      }

      return h * 60 + roundedMinute;
    }

    function parseTimeParts(timeText) {
      if (timeText === null || timeText === undefined || timeText === '') {
        return null;
      }

      const s = String(timeText).trim();

      const match = s.match(/(\d{1,2})\s*:\s*(\d{1,2})(?:\s*:\s*(\d{1,2}))?/);

      if (!match) {
        return null;
      }

      const h = parseInt(match[1], 10);
      const m = parseInt(match[2], 10);

      if (isNaN(h) || isNaN(m)) {
        return null;
      }

      return {
        h: h,
        m: m
      };
    }

    function formatTime(timeText) {
      const parsed = parseTimeParts(timeText);

      if (!parsed) {
        return '-';
      }

      return pad2(parsed.h) + ':' + pad2(parsed.m);
    }

    function formatHour(value) {
      const num = parseFloat(value || 0);

      if (isNaN(num)) {
        return '0';
      }

      return Number(num.toFixed(2)).toString();
    }

    function getField(obj, keys) {
      for (let i = 0; i < keys.length; i++) {
        if (obj && obj[keys[i]] !== undefined && obj[keys[i]] !== null) {
          return String(obj[keys[i]]).trim();
        }
      }

      return '';
    }

    function pad2(num) {
      return String(num).padStart(2, '0');
    }

    function apiCall(params, callback) {
      const cbName = 'jsonpCallback_' + Date.now() + '_' + Math.floor(Math.random() * 100000);

      params.callback = cbName;
      params._t = Date.now();

      const query = Object.keys(params)
        .map(function (key) {
          return encodeURIComponent(key) + '=' + encodeURIComponent(params[key]);
        })
        .join('&');

      const script = document.createElement('script');
      script.src = API_URL + '?' + query;

      let timer = setTimeout(function () {
        cleanup();
        setButtons(true);
        setStatus('連線逾時，請檢查網路或 Apps Script 部署權限');
      }, 15000);

      window[cbName] = function (res) {
        cleanup();
        callback(res);
      };

      script.onerror = function () {
        cleanup();
        setButtons(true);
        setStatus(
          '無法連接 Google Apps Script API\n\n' +
          '目前連線網址：\n' +
          script.src + '\n\n' +
          '請確認 GitHub Pages 是否已更新到新版'
        );
      };

      function cleanup() {
        clearTimeout(timer);
        delete window[cbName];

        if (script.parentNode) {
          script.parentNode.removeChild(script);
        }
      }

      document.body.appendChild(script);
    }

    function setStatus(text) {
      document.getElementById('status').innerText = text;
    }

    function setButtons(enabled) {
      const buttons = document.querySelectorAll('button');

      buttons.forEach(function (btn) {
        btn.disabled = !enabled;
      });
    }

    function closeLiffAfterSuccess() {
      setTimeout(function () {
        try {
          if (typeof liff !== 'undefined' && liff.isInClient()) {
            liff.closeWindow();
          }
        } catch (err) {
          console.log('LIFF 自動關閉失敗：', err);
        }
      }, 1000);
    }
  </script>
</body>
</html>
