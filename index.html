<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>小時候打卡系統</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js">

    // =====================================================
    // V29 前端保險：只要 API 回傳待審核/補卡待審核，就固定顯示完整文字
    // =====================================================

    const PENDING_MAKEUP_DISPLAY_TEXT_V29_FRONT = '待審核 (太久沒通過,請聯繫主管)';

    function isPendingMakeupDisplayTextV29Front(value) {
      const text = String(value || '').trim();

      return (
        text.indexOf('待審核') !== -1 ||
        text.indexOf('送審中') !== -1 ||
        text.indexOf('補卡待審核') !== -1 ||
        text.indexOf('補卡送審中') !== -1 ||
        text.indexOf('上班補卡待審核') !== -1
      );
    }

    function formatTimeWithSeconds(timeText) {
      const raw = String(timeText || '').trim();

      if (isPendingMakeupDisplayTextV29Front(raw)) {
        return PENDING_MAKEUP_DISPLAY_TEXT_V29_FRONT;
      }

      const parsed = parseTimeParts(raw);

      if (!parsed) {
        return '-';
      }

      const sec = parsed.s !== undefined && parsed.s !== null ? parsed.s : 0;
      return pad2(parsed.h) + ':' + pad2(parsed.m) + ':' + pad2(sec);
    }

    function formatTime(timeText) {
      const raw = String(timeText || '').trim();

      if (isPendingMakeupDisplayTextV29Front(raw)) {
        return PENDING_MAKEUP_DISPLAY_TEXT_V29_FRONT;
      }

      const parsed = parseTimeParts(raw);

      if (!parsed) {
        return '-';
      }

      return pad2(parsed.h) + ':' + pad2(parsed.m);
    }

    function recordShouldDisplayV29Front(record) {
      const result = getField(record, ['result', '狀態']);
      const status = getField(record, ['status', '狀態']);
      const time = getField(record, ['time', '時間']);

      return (
        result === '成功' ||
        result === '補卡' ||
        result === '待審核' ||
        result === '送審中' ||
        status.indexOf('待審核') !== -1 ||
        status.indexOf('送審中') !== -1 ||
        isPendingMakeupDisplayTextV29Front(time)
      );
    }

    function formatGroupedRecordsText(title, records) {
      records = records || [];

      records = records.filter(function (r) {
        return recordShouldDisplayV29Front(r);
      });

      if (records.length === 0) {
        return title + '\n\n目前沒有紀錄';
      }

      const map = {};

      records.forEach(function (r) {
        const date = getField(r, ['date', '日期']);
        const store = getField(r, ['store', '分店']);
        const type = getField(r, ['type', '類型', '動作']);
        let time = getField(r, ['time', '時間']);
        const result = getField(r, ['result', '狀態']);
        const status = getField(r, ['status', '狀態']);

        if (isPendingMakeupDisplayTextV29Front(time) || isPendingMakeupDisplayTextV29Front(result) || isPendingMakeupDisplayTextV29Front(status)) {
          time = PENDING_MAKEUP_DISPLAY_TEXT_V29_FRONT;
        }

        const key = date + '_' + store;

        if (!map[key]) {
          map[key] = {
            date: date,
            store: store,
            workIn: '',
            breakStart: '',
            breakEnd: '',
            workOut: '',
            result: result,
            status: status,
            hours: ''
          };
        }

        if (type === '上班打卡') {
          map[key].workIn = time;
        } else if (type === '休息開始') {
          map[key].breakStart = time;
        } else if (type === '休息結束') {
          map[key].breakEnd = time;
        } else if (type === '下班打卡') {
          map[key].workOut = time;
        }
      });

      const days = Object.values(map);

      days.sort(function (a, b) {
        return String(b.date).localeCompare(String(a.date));
      });

      const workDaySet = new Set();
      let totalHours = 0;

      days.forEach(function (d) {
        const hasPending =
          isPendingMakeupDisplayTextV29Front(d.workIn) ||
          isPendingMakeupDisplayTextV29Front(d.breakStart) ||
          isPendingMakeupDisplayTextV29Front(d.breakEnd) ||
          isPendingMakeupDisplayTextV29Front(d.workOut);

        if (d.workIn || d.workOut) {
          workDaySet.add(String(d.date || '').trim());
        }

        if (!hasPending && d.workIn && d.workOut) {
          d.hours = calcWorkHours(d.workIn, d.workOut, d.breakStart, d.breakEnd);
        } else {
          d.hours = '';
        }

        const h = parseFloat(d.hours);

        if (!isNaN(h)) {
          totalHours += h;
        }
      });

      const workDays = workDaySet.size;

      let text =
        title + '\n\n' +
        '上班天數：' + workDays + ' 天\n' +
        '總工時：' + formatHour(totalHours) + ' 小時\n\n';

      days.forEach(function (d, index) {
        text +=
          (index + 1) + '. ' + (d.date || '-') + '\n' +
          '分店：' + (d.store || '-') + '\n' +
          '上班打卡：' + formatTime(d.workIn) + '\n' +
          '休息開始：' + formatTime(d.breakStart) + '\n' +
          '休息結束：' + formatTime(d.breakEnd) + '\n' +
          '下班打卡：' + formatTime(d.workOut) + '\n' +
          '工時：' + (d.hours !== '' ? formatHour(d.hours) + ' 小時' : '-') + '\n\n';
      });

      return text.trim();
    }

    // =====================================================
    // V35：補卡重複待審核確認畫面修正
    // 顯示 類型:時間，加入「取代 / 取消」按鈕
    // 並保留剛才輸入的補卡資料，按取代時不會因表單消失而失敗
    // =====================================================

    let pendingMakeupReplacePayloadV35 = null;

    function collectMakeupPayloadV35() {
      const dateInput = document.getElementById('makeupDate');
      const storeInput = document.getElementById('makeupStore');
      const typeInput = document.getElementById('makeupType');
      const timeInput = document.getElementById('makeupTime');
      const reasonInput = document.getElementById('makeupReason');

      if (dateInput || storeInput || typeInput || timeInput || reasonInput) {
        return {
          date: dateInput ? String(dateInput.value || '').replace(/-/g, '/') : '',
          store: storeInput ? storeInput.value : '',
          type: typeInput ? typeInput.value : '',
          time: timeInput ? timeInput.value : '',
          reason: reasonInput ? reasonInput.value.trim() : ''
        };
      }

      return Object.assign({}, pendingMakeupReplacePayloadV35 || {});
    }

    function submitMakeupRequest(replacePending) {
      replacePending = replacePending === true;

      const payload = collectMakeupPayloadV35();
      const date = payload.date || '';
      const store = payload.store || '';
      const type = payload.type || '';
      const time = payload.time || '';
      const reason = payload.reason || '';

      if (!date || !store || !type || !time || !reason) {
        setStatus('補卡資料不完整，請確認日期、分店、類型、時間與原因。');
        return;
      }

      pendingMakeupReplacePayloadV35 = {
        date: date,
        store: store,
        type: type,
        time: time,
        reason: reason
      };

      setButtons(false);
      setStatus(replacePending ? '正在取代上一筆補卡申請...' : '正在送出補卡申請...');

      apiCall({
        action: 'submitMakeupRequest',
        userId: lineUserId,
        date: date,
        store: store,
        type: type,
        time: time,
        reason: reason,
        replacePending: replacePending ? 'true' : 'false',
        forceReplacePending: replacePending ? 'YES' : 'NO',
        confirmReplace: replacePending ? 'true' : 'false',
        overridePending: replacePending ? '1' : '0'
      }, function (res) {
        setButtons(true);

        if (!res.ok) {
          const msg = String(res.message || '');

          if (
            res.replaceRequired ||
            res.code === 'REPLACE_PENDING_MAKEUP' ||
            msg.indexOf('同類型補卡') !== -1 ||
            msg.indexOf('取代剛才') !== -1
          ) {
            showReplacePendingMakeupConfirm(res || {});
            return;
          }

          if (res.code === 'EXISTING_CLOCK_RECORD') {
            showMakeupBlockedByExistingClock(res);
            return;
          }

          if (msg.includes('尚未綁定')) {
            showBindRequired('忘記打卡');
          } else {
            setStatus(res.message || '補卡申請送出失敗');
          }
          return;
        }

        pendingMakeupReplacePayloadV35 = null;
        showMakeupSubmitted(res);
      });
    }

    function showReplacePendingMakeupConfirm(res) {
      const statusBox = document.getElementById('status');
      const payload = Object.assign({}, pendingMakeupReplacePayloadV35 || {});

      const displayName = res.name || lineDisplayName || '-';
      const displayStore = res.store || payload.store || '-';
      const displayDate = res.date || payload.date || '-';
      const displayType = res.type || payload.type || '-';
      const displayTime = formatTime(res.time || payload.time || '');
      const displayReason = res.reason || payload.reason || '-';

      statusBox.innerHTML =
        '<div class="success-card">' +
          '<div class="success-title">已有同類型補卡待審核</div>' +
          '<div class="success-note">你已經有一筆同類型補卡正在待審核。\n\n' +
          '是否要取代剛才的補卡申請？</div>' +
          '<div class="success-list">' +
            makeSuccessRowHtml('姓名', displayName) +
            makeSuccessRowHtml('分店', displayStore) +
            makeSuccessRowHtml('日期', displayDate) +
            makeSuccessRowHtml('類型:時間', displayType + '：' + displayTime) +
            makeSuccessRowHtml('原因', displayReason) +
          '</div>' +
          '<button class="btn-main" onclick="submitMakeupRequest(true)">取代</button>' +
          '<button class="btn-outline" onclick="showMakeupPage()">取消</button>' +
        '</div>';
    }


</script>

<body>
  <div class="wrap">
    <div class="header">
      <div class="brand">小時候打卡系統</div>
      <div class="subtitle">員工上下班・休息紀錄</div>
    </div>

    <div class="card">
      <div id="status" class="status">系統載入中...</div>

      <div id="bindBox" class="hidden">
        <div class="section-title">第一次使用｜綁定員工UID</div>
        <input id="employeeId" type="text" placeholder="請輸入員工UID (電話號碼)">
        <button class="btn-bind" onclick="bindEmployee()">綁定員工資料</button>
      </div>

      <div id="homeBox" class="hidden">
        <div class="section-title">請從 LINE 下方選單操作</div>
        <button class="btn-main" onclick="sendClock('上班打卡')">上班打卡</button>
        <button class="btn-main" onclick="sendClock('下班打卡')">下班打卡</button>
        <button class="btn-main" onclick="sendClock('休息開始')">開始休息</button>
        <button class="btn-main" onclick="sendClock('休息結束')">結束休息</button>
        <button class="btn-outline" onclick="showMakeupPage()">忘記打卡 / 補卡申請</button>
        <button class="btn-outline" onclick="showRecordsHub('month')">打卡紀錄</button>
      </div>

      <div class="tips">
        打卡時會使用手機定位確認是否在分店範圍內
      </div>
    </div>

    <div class="footer">
      LIFF ID：2010226307-AZeYYFbb
    </div>
  </div>

  <script>
    const LIFF_ID = '2010226307-AZeYYFbb';

    const API_URL = 'https://script.google.com/macros/s/AKfycbyMjNZ6Tzl7cm6v43JYrbI5UCnQcwdqMG9bfJ3sv5HDkgKPe6yDnF1khfJu4asbrFjc/exec';

    let lineUserId = '';
    let lineDisplayName = '';
    let lastActionType = '';
    let lastBreakFixRowKey = '';

    window.onload = async function () {
      setStatus('正在啟動打卡系統...');

      try {
        if (typeof liff === 'undefined') {
          setStatus('LIFF SDK 載入失敗，請重新開啟 LINE');
          return;
        }

        await liff.init({
          liffId: LIFF_ID,
          withLoginOnExternalBrowser: true
        });

        if (!liff.isLoggedIn()) {
          setStatus('尚未登入 LINE，正在前往登入...');
          liff.login();
          return;
        }

        const profile = await liff.getProfile();

        lineUserId = profile.userId;
        lineDisplayName = profile.displayName;

        handleRoute();

      } catch (err) {
        setStatus(
          '初始化失敗\n\n' +
          '錯誤訊息：' + err.message + '\n\n' +
          '請確認 LIFF Endpoint URL 是否正確'
        );
      }
    };

    function getUrlParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    function hideAllBoxes() {
      document.getElementById('bindBox').classList.add('hidden');
      document.getElementById('homeBox').classList.add('hidden');
    }

    function handleRoute() {
      const action = getUrlParam('action');

      hideAllBoxes();

      if (action === 'workIn') {
        sendClock('上班打卡');
        return;
      }

      if (action === 'workOut') {
        sendClock('下班打卡');
        return;
      }

      if (action === 'breakStart') {
        sendClock('休息開始');
        return;
      }

      if (action === 'breakEnd') {
        sendClock('休息結束');
        return;
      }

      // 圖文選單原本「本月紀錄」的連結改成忘記打卡 / 補卡頁面。
      // 舊連結 action=monthRecords 也會直接進入補卡頁面，避免重新設定前就不能用。
      if (action === 'monthRecords' || action === 'makeup' || action === 'forgetClock') {
        showMakeupPage();
        return;
      }

      // 歷史紀錄連結改成「紀錄總覽」：預設本月，頁面內可切換歷史。
      if (action === 'historyRecords' || action === 'records') {
        showRecordsHub('month');
        return;
      }

      document.getElementById('homeBox').classList.remove('hidden');

      setStatus(
        'LINE 身分取得成功\n' +
        'LINE 名稱：' + lineDisplayName + '\n\n' +
        '請從 LINE 下方選單選擇打卡項目'
      );
    }

    function startGeoClock(type) {
      setButtons(false);
      setStatus('正在取得手機定位...\n請允許定位權限');

      if (!navigator.geolocation) {
        setButtons(true);
        setStatus('此手機不支援定位功能');
        return;
      }

      navigator.geolocation.getCurrentPosition(
        function (position) {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;

          setSendingStatus(type);

          apiCall({
            action: 'clockIn',
            userId: lineUserId,
            type: type,
            lat: lat,
            lng: lng
          }, function (res) {
            setButtons(true);

            if (res.ok) {
              showClockSuccess(res, type);

            } else {
              if (String(res.message || '').includes('尚未綁定')) {
                showBindRequired(type);
              } else {
                setStatus(res.message || '打卡失敗');
              }
            }
          });
        },
        function (error) {
          setButtons(true);

          let msg = '定位失敗';

          if (error.code === 1) {
            msg = '你拒絕了定位權限，無法打卡';
          } else if (error.code === 2) {
            msg = '無法取得目前位置';
          } else if (error.code === 3) {
            msg = '定位逾時，請再試一次';
          }

          setStatus(msg);
        },
        {
          enableHighAccuracy: true,
          timeout: 15000,
          maximumAge: 0
        }
      );
    }

    function formatGroupedRecordsText(title, records) {
  records = records || [];

  records = records.filter(function (r) {
    const result = getField(r, ['result', '狀態']);
    return result === '成功' || result === '補卡';
  });

  if (records.length === 0) {
    return title + '\n\n目前沒有紀錄';
  }

  const map = {};
      records.forEach(function (r) {
        const date = getField(r, ['date', '日期']);
        const store = getField(r, ['store', '分店']);
        const type = getField(r, ['type', '類型', '動作']);
        const time = getField(r, ['time', '時間']);
        const result = getField(r, ['result', '狀態']);

        const key = date + '_' + store;

        if (!map[key]) {
          map[key] = {
            date: date,
            store: store,
            workIn: '',
            breakStart: '',
            breakEnd: '',
            workOut: '',
            result: result,
            hours: ''
          };
        }

        if (type === '上班打卡') {
          map[key].workIn = time;
        } else if (type === '休息開始') {
          map[key].breakStart = time;
        } else if (type === '休息結束') {
          map[key].breakEnd = time;
        } else if (type === '下班打卡') {
          map[key].workOut = time;
        }

        if (result) {
          map[key].result = result;
        }
      });

      const days = Object.values(map);

      days.sort(function (a, b) {
        return String(b.date).localeCompare(String(a.date));
      });

const workDaySet = new Set();
let totalHours = 0;

days.forEach(function (d) {
  if (d.workIn || d.workOut) {
    workDaySet.add(String(d.date || '').trim());
  }

  if (d.workIn && d.workOut) {
    d.hours = calcWorkHours(d.workIn, d.workOut, d.breakStart, d.breakEnd);
  } else {
    d.hours = '';
  }

  const h = parseFloat(d.hours);

  if (!isNaN(h)) {
    totalHours += h;
  }
});

const workDays = workDaySet.size;

      let text =
        title + '\n\n' +
        '上班天數：' + workDays + ' 天\n' +
        '總工時：' + formatHour(totalHours) + ' 小時\n\n';

      days.forEach(function (d, index) {
        text +=
          (index + 1) + '. ' + (d.date || '-') + '\n' +
          '分店：' + (d.store || '-') + '\n' +
          '上班打卡：' + formatTime(d.workIn) + '\n' +
          '休息開始：' + formatTime(d.breakStart) + '\n' +
          '休息結束：' + formatTime(d.breakEnd) + '\n' +
          '下班打卡：' + formatTime(d.workOut) + '\n' +
          '工時：' + (d.hours !== '' ? formatHour(d.hours) + ' 小時' : '-') + '\n\n';
      });

      return text.trim();
    }

    function calcWorkHours(workIn, workOut, breakStart, breakEnd) {
      const inMin = roundedTimeToMinutes(workIn);
      const outMin = roundedTimeToMinutes(workOut);

      if (inMin === null || outMin === null) {
        return '';
      }

      let total = outMin - inMin;

      if (total < 0) {
        total += 24 * 60;
      }

      const bsMin = roundedTimeToMinutes(breakStart);
      const beMin = roundedTimeToMinutes(breakEnd);

      if (bsMin !== null && beMin !== null) {
        let breakTotal = beMin - bsMin;

        if (breakTotal < 0) {
          breakTotal += 24 * 60;
        }

        total -= breakTotal;
      }

      if (total < 0) {
        total = 0;
      }

      return Math.round((total / 60) * 100) / 100;
    }

    function roundedTimeToMinutes(timeText) {
      const parsed = parseTimeParts(timeText);

      if (!parsed) {
        return null;
      }

      let h = parsed.h;
      const m = parsed.m;

      let roundedMinute = 0;

      if (m >= 0 && m <= 15) {
        roundedMinute = 0;
      } else if (m >= 16 && m <= 45) {
        roundedMinute = 30;
      } else if (m >= 46 && m <= 59) {
        h += 1;
        roundedMinute = 0;
      }

      return h * 60 + roundedMinute;
    }

    function parseTimeParts(timeText) {
      if (timeText === null || timeText === undefined || timeText === '') {
        return null;
      }

      const s = String(timeText).trim();

      const match = s.match(/(\d{1,2})\s*:\s*(\d{1,2})(?:\s*:\s*(\d{1,2}))?/);

      if (!match) {
        return null;
      }

      const h = parseInt(match[1], 10);
      const m = parseInt(match[2], 10);
      const sec = match[3] !== undefined ? parseInt(match[3], 10) : 0;

      if (isNaN(h) || isNaN(m)) {
        return null;
      }

      return {
        h: h,
        m: m,
        s: isNaN(sec) ? 0 : sec
      };
    }

    function getTodaySheetDate() {
      const d = new Date();
      return d.getFullYear() + '/' + pad2(d.getMonth() + 1) + '/' + pad2(d.getDate());
    }

    function getCurrentTimeText() {
      const d = new Date();
      return pad2(d.getHours()) + ':' + pad2(d.getMinutes());
    }

    function formatTimeWithSeconds(timeText) {
      const parsed = parseTimeParts(timeText);

      if (!parsed) {
        return '-';
      }

      const sec = parsed.s !== undefined && parsed.s !== null ? parsed.s : 0;
      return pad2(parsed.h) + ':' + pad2(parsed.m) + ':' + pad2(sec);
    }

    function formatTime(timeText) {
      const parsed = parseTimeParts(timeText);

      if (!parsed) {
        return '-';
      }

      return pad2(parsed.h) + ':' + pad2(parsed.m);
    }

    function formatHour(value) {
      const num = parseFloat(value || 0);

      if (isNaN(num)) {
        return '0';
      }

      return Number(num.toFixed(2)).toString();
    }

    function getField(obj, keys) {
      for (let i = 0; i < keys.length; i++) {
        if (obj && obj[keys[i]] !== undefined && obj[keys[i]] !== null) {
          return String(obj[keys[i]]).trim();
        }
      }

      return '';
    }

    function pad2(num) {
      return String(num).padStart(2, '0');
    }

    function apiCall(params, callback) {
      const cbName = 'jsonpCallback_' + Date.now() + '_' + Math.floor(Math.random() * 100000);

      params.callback = cbName;
      params._t = Date.now();

      const query = Object.keys(params)
        .map(function (key) {
          return encodeURIComponent(key) + '=' + encodeURIComponent(params[key]);
        })
        .join('&');

      const script = document.createElement('script');
      script.src = API_URL + '?' + query;

      let timer = setTimeout(function () {
        cleanup();
        setButtons(true);
        setStatus('連線逾時，請檢查網路或 Apps Script 部署權限');
      }, 15000);

      window[cbName] = function (res) {
        cleanup();
        callback(res);
      };

      script.onerror = function () {
        cleanup();
        setButtons(true);
        setStatus(
          '無法連接 Google Apps Script API\n\n' +
          '目前連線網址：\n' +
          script.src + '\n\n' +
          '請確認 GitHub Pages 是否已更新到新版'
        );
      };

      function cleanup() {
        clearTimeout(timer);
        delete window[cbName];

        if (script.parentNode) {
          script.parentNode.removeChild(script);
        }
      }

      document.body.appendChild(script);
    }

      type: typeInput ? typeInput.value : '',
      time: timeInput ? timeInput.value : '',
      reason: reasonInput ? reasonInput.value.trim() : ''
    };
  }

  return Object.assign({}, pendingMakeupReplacePayloadV47 || pendingMakeupReplacePayloadV40 || pendingMakeupReplacePayloadV35 || {});
}

function submitMakeupRequest(replacePending) {
  replacePending = replacePending === true;

  const payload = collectMakeupPayloadV47();
  const date = payload.date || '';
  const store = payload.store || '';
  const type = payload.type || '';
  const time = payload.time || '';
  const reason = payload.reason || '';

  if (!date || !store || !type || !time || !reason) {
    setStatus('補卡資料不完整，請確認日期、分店、類型、時間與原因。');
    return;
  }

  pendingMakeupReplacePayloadV47 = {
    date: date,
    store: store,
    type: type,
    time: time,
    reason: reason
  };

  setButtons(false);
  setStatus(replacePending ? '正在取代上一筆補卡申請...' : '正在送出補卡申請...');

  apiCall({
    action: 'submitMakeupRequest',
    userId: lineUserId,
    date: date,
    store: store,
    type: type,
    time: time,
    reason: reason,
    replacePending: replacePending ? 'true' : 'false',
    forceReplacePending: replacePending ? 'YES' : 'NO',
    confirmReplace: replacePending ? 'true' : 'false',
    replaceConfirm: replacePending ? 'true' : 'false',
    overridePending: replacePending ? '1' : '0',
    replace: replacePending ? 'replace' : '',
    mode: replacePending ? 'replace' : '',
    replaceRequest: replacePending ? 'true' : 'false',
    replaceAction: replacePending ? 'CONFIRM_REPLACE_V47' : '',
    replaceToken: replacePending ? 'REPLACE_NOW_V47' : ''
  }, function (res) {
    setButtons(true);

    const msg = String(res && res.message || '');
    const needsReplace = !!(
      res && (
        res.replaceRequired ||
        res.needReplace ||
        res.code === 'REPLACE_PENDING_MAKEUP' ||
        msg.indexOf('同類型補卡') !== -1 ||
        msg.indexOf('取代剛才') !== -1
      )
    );

    if (needsReplace) {
      if (replacePending) {
        setStatus(
          '取代失敗：後端仍要求取代確認。\n\n' +
          '目前前端已送出 replaceAction=CONFIRM_REPLACE_V47。\n' +
          '請確認 GAS 已覆蓋 V47 並重新部署 Web App。\n\n' +
          '後端版本：' + (res.backendPatch || res.debugVersion || '未回傳')
        );
        return;
      }

      showReplacePendingMakeupConfirm(res || {});
      return;
    }

    if (!res || !res.ok) {
      if (res && res.code === 'EXISTING_CLOCK_RECORD') {
        showMakeupBlockedByExistingClock(res);
        return;
      }

      if (msg.includes('尚未綁定')) {
        showBindRequired('忘記打卡');
      } else {
        setStatus(msg || '補卡申請送出失敗');
      }
      return;
    }

    pendingMakeupReplacePayloadV47 = null;
    if (typeof pendingMakeupReplacePayloadV40 !== 'undefined') pendingMakeupReplacePayloadV40 = null;
    if (typeof pendingMakeupReplacePayloadV35 !== 'undefined') pendingMakeupReplacePayloadV35 = null;
    showMakeupSubmitted(res);
  });
}

function confirmReplacePendingMakeupV40() {
  submitMakeupRequest(true);
}

function confirmReplacePendingMakeupV47() {
  submitMakeupRequest(true);
}

setTimeout(function () {
  try {
    const footer = document.querySelector('.footer');
    if (footer) {
      footer.innerText = 'LIFF ID：2010226307-AZeYYFbb｜前端 V47';
    }
  } catch (e) {}
}, 500);
</script>


<script>

function showReplacePendingMakeupConfirm(res) {
  const statusBox = document.getElementById('status');
  const payload = Object.assign(
    {},
    (typeof pendingMakeupReplacePayloadV47 !== 'undefined' ? pendingMakeupReplacePayloadV47 : null) ||

    previous.type ||
    res.previousType ||
    res.oldType ||
    res.pendingType ||

    res.previousTime ||
    res.oldTime ||
    res.pendingTime ||
    '';

  const previousTime = previousTimeRaw ? formatTime(previousTimeRaw) : '未取得上一筆時間';

  const currentType =
    current.type ||
    res.currentType ||
    res.type ||
    payload.type ||

  const currentTimeRaw =

  statusBox.innerHTML =

      '<div class="success-list">' +
        makeSuccessRowHtml('姓名', displayName) +
        makeSuccessRowHtml('分店', displayStore) +
        makeSuccessRowHtml('日期', displayDate) +
        makeSuccessRowHtml('上一筆申請', previousType + '：' + (previousTime || '-')) +
        makeSuccessRowHtml('本次申請(取代)', currentType + '：' + (currentTime || '-')) +
      '</div>' +

function cancelReplacePendingMakeupV48() {

setTimeout(function () {

<script>
// =====================================================
// 前端 V52：主管代打卡頁面
// 網址：LIFF_URL?action=adminPunch
// 只有 GAS 白名單內的主管 LINE userId 會看到表單。
// V52：員工改成「姓名下拉選單」，不用手動複製 LINE userId。
// =====================================================

var handleRouteBeforeAdminProxyV52 = typeof handleRoute === 'function' ? handleRoute : null;
var adminProxyEmployeesV52 = [];
var adminProxyStoresV52 = [];

handleRoute = function () {
  const action = getUrlParam('action');

  if (action === 'adminPunch') {
    showAdminProxyAccessGateV52();
    return;
  }

  if (handleRouteBeforeAdminProxyV52) {
    handleRouteBeforeAdminProxyV52();
  }
};

function showAdminProxyAccessGateV52() {
  hideAllBoxes();

  if (!lineUserId) {
    setStatus('尚未取得 LINE userId，請重新從 LINE 開啟。');
    return;
  }

  setButtons(false);
  setStatus('正在確認主管權限並讀取員工清單...');

  apiCall({
    action: 'getAdminProxyEmployees',
    adminUserId: lineUserId
  }, function (res) {
    setButtons(true);

    if (!res || !res.ok || !res.allowed) {
      renderAdminProxyDeniedV52(res || {});
      return;
    }

    adminProxyEmployeesV52 = Array.isArray(res.employees) ? res.employees : [];
    adminProxyStoresV52 = Array.isArray(res.stores) ? res.stores : [];

    renderAdminProxyFormV52();
  });
}

function renderAdminProxyDeniedV52(res) {
  const statusBox = document.getElementById('status');

  statusBox.innerHTML =
    '<div class="status-blocked">' +
      '<div class="status-blocked-icon">⛔</div>' +
      '<div class="status-blocked-title">無主管權限</div>' +
      '<div class="status-blocked-message">' +
        '此頁面僅限主管 / 開發者使用。\n\n' +
        '目前 LINE 名稱：' + escapeHtml(lineDisplayName || '-') + '\n' +
        '目前 LINE userId：' + escapeHtml(lineUserId || '-') + '\n\n' +
        escapeHtml(res.message || '你沒有使用主管代打卡的權限。') +
      '</div>' +
    '</div>';
}

function adminProxyTodayInputV52() {
  const d = new Date();
  return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
}

function adminProxyCurrentTimeInputV52() {
  const d = new Date();
  return pad2(d.getHours()) + ':' + pad2(d.getMinutes());
}

function renderAdminProxyFormV52() {
  hideAllBoxes();

  const statusBox = document.getElementById('status');

  statusBox.innerHTML =
    '<div class="success-card">' +
      '<div class="success-title">主管代打卡</div>' +
      '<div class="form-note">員工 LINE 帳號遇到 BUG 無法打卡時使用。請直接選員工姓名，不用再找 LINE userId。此功能不檢查主管定位，會依照你選擇的分店、日期與時間寫入正式打卡紀錄。</div>' +

      '<div class="mini-title">主管</div>' +
      '<div class="success-list">' +
        makeSuccessRowHtml('LINE 名稱', lineDisplayName || '-') +
        makeSuccessRowHtml('主管 userId', lineUserId || '-') +
      '</div>' +

      '<div class="mini-title">搜尋員工</div>' +
      '<input id="adminProxyEmployeeFilterV52" type="text" placeholder="輸入姓名 / 員工ID / 分店快速搜尋" oninput="adminProxyRenderEmployeeOptionsV52()">' +

      '<div class="mini-title">選擇員工</div>' +
      '<select id="adminProxyEmployeeSelectV52" onchange="adminProxyOnEmployeeChangedV52()"></select>' +
      '<div id="adminProxyEmployeeInfoV52"></div>' +

      '<div class="mini-title">分店</div>' +
      '<select id="adminProxyStoreV52"></select>' +

      '<div class="mini-title">打卡類型</div>' +
      '<select id="adminProxyTypeV52">' +
        '<option value="下班打卡">下班打卡</option>' +
        '<option value="上班打卡">上班打卡</option>' +
        '<option value="休息開始">休息開始</option>' +
        '<option value="休息結束">休息結束</option>' +
      '</select>' +

      '<div class="mini-title">指定日期</div>' +
      '<input id="adminProxyDateV52" type="date" value="' + escapeHtml(adminProxyTodayInputV52()) + '">' +

      '<div class="mini-title">指定時間</div>' +
      '<input id="adminProxyTimeV52" type="time" value="' + escapeHtml(adminProxyCurrentTimeInputV52()) + '">' +

      '<div class="mini-title">代打原因</div>' +
      '<textarea id="adminProxyReasonV52" placeholder="例如：員工帳號 BUG，無法打卡下班">員工帳號 BUG，無法打卡</textarea>' +

      '<div class="mini-title">主管密碼</div>' +
      '<input id="adminProxyPinV52" type="password" placeholder="請輸入主管密碼">' +

      '<button class="btn-main" onclick="submitAdminProxyClockInV52()">送出正式代打卡</button>' +
      '<button class="btn-outline" onclick="closeLiffNow()">關閉畫面</button>' +
    '</div>';

  adminProxyRenderEmployeeOptionsV52(presetTargetUserId);
}

function adminProxyNormalizeSearchTextV52(value) {
  return String(value || '').trim().toLowerCase();
}

function adminProxyGetVisibleEmployeesV52() {
  const input = document.getElementById('adminProxyEmployeeFilterV52');
  const keyword = adminProxyNormalizeSearchTextV52(input ? input.value : '');

  if (!keyword) {
    return adminProxyEmployeesV52.slice();
  }

  return adminProxyEmployeesV52.filter(function(emp) {
    const haystack = [
      emp.name,
      emp.employeeId,
      emp.userId,
      emp.allowedStores,
      emp.position,
      emp.label
    ].map(function(v) {
      return adminProxyNormalizeSearchTextV52(v);
    }).join(' ');

    return haystack.indexOf(keyword) !== -1;
  });
}

function adminProxyRenderEmployeeOptionsV52(presetTargetUserId) {
  const select = document.getElementById('adminProxyEmployeeSelectV52');

  if (!select) return;

  const employees = adminProxyGetVisibleEmployeesV52();
  const preset = String(presetTargetUserId || '').trim();
  let html = '';

  if (adminProxyEmployeesV52.length === 0) {
    html = '<option value="">目前沒有可代打卡的啟用員工</option>';
    select.innerHTML = html;
    adminProxyOnEmployeeChangedV52();
    return;
  }

  if (employees.length === 0) {
    html = '<option value="">搜尋不到員工</option>';
    select.innerHTML = html;
    adminProxyOnEmployeeChangedV52();
    return;
  }

  html += '<option value="">請選擇員工</option>';

  employees.forEach(function(emp) {
    const label = (emp.name || '-') + '｜' + (emp.employeeId || '-') + '｜' + (emp.allowedStores || '全部');
    const selected = preset && String(emp.userId || '').trim() === preset ? ' selected' : '';

    html += '<option value="' + escapeHtml(emp.userId || '') + '"' + selected + '>' + escapeHtml(label) + '</option>';
  });

  select.innerHTML = html;

  if (preset) {
    const found = employees.some(function(emp) {
      return String(emp.userId || '').trim() === preset;
    });

    if (!found) {
      const infoBox = document.getElementById('adminProxyEmployeeInfoV52');
      if (infoBox) {
        infoBox.innerHTML =
          '<div class="success-note">網址帶入的員工 userId 不在目前員工清單內：\n' + escapeHtml(preset) + '\n\n請直接改用姓名下拉選單選擇。</div>';
      }
    }
  }

  adminProxyOnEmployeeChangedV52();
}

function adminProxyFindEmployeeByUserIdV52(userId) {
  const clean = String(userId || '').trim();

  if (!clean) return null;

  for (let i = 0; i < adminProxyEmployeesV52.length; i++) {
    if (String(adminProxyEmployeesV52[i].userId || '').trim() === clean) {
      return adminProxyEmployeesV52[i];
    }
  }

  return null;
}

function adminProxyGetSelectedEmployeeV52() {
  const select = document.getElementById('adminProxyEmployeeSelectV52');
  const userId = select ? String(select.value || '').trim() : '';
  return adminProxyFindEmployeeByUserIdV52(userId);
}

function adminProxySplitStoresV52(allowedStoresText) {
  const text = String(allowedStoresText || '').trim();

  if (!text || text === '全部') {
    return adminProxyStoresV52.slice();
  }

  const stores = text
    .split(/[，,、\n]/)
    .map(function(s) { return String(s || '').trim(); })
    .filter(function(s) { return !!s; });

  return stores.length > 0 ? stores : adminProxyStoresV52.slice();
}

function adminProxyOnEmployeeChangedV52() {
  const emp = adminProxyGetSelectedEmployeeV52();
  const infoBox = document.getElementById('adminProxyEmployeeInfoV52');

  if (infoBox) {
    if (!emp) {
      infoBox.innerHTML =
        '<div class="success-note">請先選擇要代打卡的員工。</div>';
    } else {
      infoBox.innerHTML =
        '<div class="success-list">' +
          makeSuccessRowHtml('姓名', emp.name || '-') +
          makeSuccessRowHtml('員工ID', emp.employeeId || '-') +
          makeSuccessRowHtml('可打卡分店', emp.allowedStores || '全部') +
          makeSuccessRowHtml('LINE userId', emp.userId || '-') +
        '</div>';
    }
  }

  adminProxyRefreshStoreOptionsV52(emp);
}

function adminProxyRefreshStoreOptionsV52(emp) {
  const storeSelect = document.getElementById('adminProxyStoreV52');

  if (!storeSelect) return;

  let stores = emp ? adminProxySplitStoresV52(emp.allowedStores) : adminProxyStoresV52.slice();

  if (!stores || stores.length === 0) {
    stores = ['瑞豐店', '六合店', '新堀江店', '國華店'];
  }

  let html = '';

  stores.forEach(function(store) {
    html += '<option value="' + escapeHtml(store) + '">' + escapeHtml(store) + '</option>';
  });

  storeSelect.innerHTML = html;
}

function submitAdminProxyClockInV52() {
  const emp = adminProxyGetSelectedEmployeeV52();
  const employeeSelect = document.getElementById('adminProxyEmployeeSelectV52');
  const storeInput = document.getElementById('adminProxyStoreV52');
  const typeInput = document.getElementById('adminProxyTypeV52');
  const dateInput = document.getElementById('adminProxyDateV52');
  const timeInput = document.getElementById('adminProxyTimeV52');
  const reasonInput = document.getElementById('adminProxyReasonV52');
  const pinInput = document.getElementById('adminProxyPinV52');

  const targetUserId = employeeSelect ? String(employeeSelect.value || '').trim() : '';
  const store = storeInput ? String(storeInput.value || '').trim() : '';
  const type = typeInput ? String(typeInput.value || '').trim() : '';
  const date = dateInput ? String(dateInput.value || '').replace(/-/g, '/') : '';
  const time = timeInput ? String(timeInput.value || '').trim() : '';
  const reason = reasonInput ? String(reasonInput.value || '').trim() : '';
  const adminPin = pinInput ? String(pinInput.value || '').trim() : '';

  if (!targetUserId || !emp) {
    setStatus('請先從下拉選單選擇員工姓名。');
    return;
  }

  if (!store) {
    setStatus('請選擇分店。');
    return;
  }

  if (!type) {
    setStatus('請選擇打卡類型。');
    return;
  }

  if (!date) {
    setStatus('請選擇指定日期。');
    return;
  }

  if (!time) {
    setStatus('請選擇指定時間。');
    return;
  }

  if (!reason) {
    setStatus('請輸入代打原因。');
    return;
  }

  if (!adminPin) {
    setStatus('請輸入主管密碼。');
    return;
  }

  setButtons(false);
  setStatus(
    '正在送出主管代打卡...\n\n' +
    '員工：' + (emp.name || '-') + '\n' +
    '員工ID：' + (emp.employeeId || '-') + '\n' +
    '分店：' + store + '\n' +
    '類型：' + type + '\n' +
    '時間：' + date + ' ' + time + '\n\n' +
    '本次不檢查主管定位距離。'
  );

  apiCall({
    action: 'adminProxyClockIn',
    adminUserId: lineUserId,
    targetUserId: targetUserId,
    store: store,
    type: type,
    date: date,
    time: time,
    reason: reason,
    adminPin: adminPin
  }, function (res) {
    setButtons(true);

    if (!res || !res.ok) {
      showAdminProxyFailedV52(res || {});
      return;
    }

    showAdminProxySuccessV52(res, type, reason);
  });
}

function showAdminProxyFailedV52(res) {
  const statusBox = document.getElementById('status');
  const msg = String(res.message || '主管代打卡失敗');

  statusBox.innerHTML =
    '<div class="status-blocked">' +
      '<div class="status-blocked-icon">❌</div>' +
      '<div class="status-blocked-title">代打卡失敗</div>' +
      '<div class="status-blocked-message">' + escapeHtml(msg) + '</div>' +
      '<button class="btn-outline" onclick="renderAdminProxyFormV52()">重新輸入</button>' +
    '</div>';
}

function showAdminProxySuccessV52(res, type, reason) {
  const statusBox = document.getElementById('status');
  const shift = res.shiftRecord || {};

  statusBox.innerHTML =
    '<div class="success-card">' +
      '<div class="success-icon">✓</div>' +
      '<div class="success-title">主管代打卡成功</div>' +
      '<div class="success-time">' + escapeHtml(formatTimeWithSeconds(res.time || '')) + '</div>' +
      '<div class="success-list">' +
        makeSuccessRowHtml('員工姓名', res.name || '-') +
        makeSuccessRowHtml('員工ID', res.employeeId || '-') +
        makeSuccessRowHtml('類型', res.type || type || '-') +
        makeSuccessRowHtml('分店', res.store || '-') +
        makeSuccessRowHtml('日期', res.date || '-') +
        makeSuccessRowHtml('時間', formatTimeWithSeconds(res.time || '')) +
        makeSuccessRowHtml('原因', reason || res.reason || '-') +
      '</div>' +
      '<div class="success-list">' +
        makeSuccessRowHtml('上班打卡', formatTimeWithSeconds(shift.workIn || '')) +
        makeSuccessRowHtml('休息開始', formatTimeWithSeconds(shift.breakStart || '')) +
        makeSuccessRowHtml('休息結束', formatTimeWithSeconds(shift.breakEnd || '')) +
        makeSuccessRowHtml('下班打卡', formatTimeWithSeconds(shift.workOut || '')) +
      '</div>' +
      '<div class="success-note">此筆已依指定員工、指定分店與指定日期時間寫入正式打卡紀錄，並已寫入「主管代打卡紀錄」稽核分頁。</div>' +
      '<button class="btn-main" onclick="renderAdminProxyFormV52()">再代打一筆</button>' +
      '<button class="btn-secondary" onclick="closeLiffNow()">關閉畫面</button>' +
    '</div>';
}

setTimeout(function () {
  try {
    const footer = document.querySelector('.footer');
    if (footer) {
      footer.innerText = 'LIFF ID：2010226307-AZeYYFbb｜前端 V52 主管代打卡';
    }
  } catch (e) {}
}, 500);

// =====================================================
// V55 修正版：避免 handleRoute 遞迴造成 Maximum call stack size exceeded
// 忘記打卡頁面加入「待審核」入口
// 權限：員工資料 E 欄「職位」包含「主管」或「開發者」才顯示。
// =====================================================
(function () {
  var originalHandleRouteV55 = window.handleRoute;

  window.handleRoute = function () {
    const action = getUrlParam('action');

    if (action === 'pendingReview' || action === 'supervisorApproval' || action === 'makeupApproval' || action === 'reviewMakeup') {
      window.showPendingReviewPageV55();
      return;
    }

    if (typeof originalHandleRouteV55 === 'function') {
      originalHandleRouteV55.call(window);
    }
  };

  window.isReviewerEmployeeV55 = function (employee) {
    if (!employee) return false;

    const position = String(employee.position || '').trim();
    const isSupervisor = String(employee.isSupervisor || '').toLowerCase();

    return (
      position.indexOf('主管') !== -1 ||
      position.indexOf('開發者') !== -1 ||
      isSupervisor === 'true' ||
      isSupervisor === '1' ||
      isSupervisor === 'yes'

      String(emp.targetEmployeeId || '').trim() === clean ||
      String(emp.employeeId || '').trim() === clean ||
      String(emp.userId || '').trim() === clean
    );
  };

  window.adminProxyFindEmployeeByAnyKeyV61 = function (key) {
    const clean = String(key || '').trim();

    if (!clean) return null;

    for (let i = 0; i < adminProxyEmployeesV52.length; i++) {

<!-- =====================================================
前端 V62：打卡畫面顯示「有未打卡紀錄」紅字提醒
顯示位置：上班 / 休息開始 / 休息結束 / 下班打卡畫面最上方
===================================================== -->
<style>
.missing-clock-warning-v62 {
  color: #d93025;
  background: #fff1f0;
  border: 1px solid rgba(217, 48, 37, 0.35);
  border-radius: 14px;
  padding: 11px 12px;
  margin: 0 0 12px;
  font-size: 16px;
  font-weight: 900;
  line-height: 1.6;
  text-align: center;
  letter-spacing: 0.5px;
}
</style>

<script>
(function () {
  const MISSING_CLOCK_FRONT_PATCH_V62 = 'V62_MISSING_CLOCK_NOTICE_ON_CLOCK_PAGES';
  const MISSING_CLOCK_WARNING_TEXT_V62 = '有未打卡紀錄\n請查看打卡紀錄 並補卡!\n補卡完畢請告知主管';

  window.missingClockNoticeV62 = null;

  function hasMissingClockNoticeV62() {
    return !!(window.missingClockNoticeV62 && window.missingClockNoticeV62.hasMissing);
  }

  function getMissingClockWarningHtmlV62() {
    return '<div class="missing-clock-warning-v62">' + escapeHtml(MISSING_CLOCK_WARNING_TEXT_V62) + '</div>';
  }

  function prependMissingClockWarningV62() {
    const statusBox = document.getElementById('status');

    if (!statusBox || !hasMissingClockNoticeV62()) {
      return;
    }

    if (statusBox.querySelector && statusBox.querySelector('.missing-clock-warning-v62')) {
      return;
    }

    statusBox.innerHTML = getMissingClockWarningHtmlV62() + statusBox.innerHTML;
  }

  function safeCheckMissingClockNoticeV62() {
    if (!lineUserId || !API_URL) {
      window.missingClockNoticeV62 = null;
      return;
    }

    const cbName = 'missingClockCallbackV62_' + Date.now() + '_' + Math.floor(Math.random() * 100000);

    const params = {
      action: 'checkMissingClockRecords',
      userId: lineUserId,
      callback: cbName,
      _t: Date.now()
    };

    const query = Object.keys(params)
      .map(function (key) {
        return encodeURIComponent(key) + '=' + encodeURIComponent(params[key]);
      })
      .join('&');

    const script = document.createElement('script');
    script.src = API_URL + '?' + query;

    let done = false;

    const timer = setTimeout(function () {
      cleanup();
    }, 6000);

    window[cbName] = function (res) {
      if (done) return;
      done = true;
      cleanup();

      if (res && res.ok && res.hasMissing) {
        window.missingClockNoticeV62 = res;
        prependMissingClockWarningV62();
      } else {
        window.missingClockNoticeV62 = null;
      }
    };

    script.onerror = function () {
      cleanup();
    };

    function cleanup() {
      clearTimeout(timer);
      try {
        delete window[cbName];
      } catch (e) {
        window[cbName] = undefined;
      }

      if (script.parentNode) {
        script.parentNode.removeChild(script);
      }
    }

    document.body.appendChild(script);
  }

  const originalSendClockV62 = typeof window.sendClock === 'function' ? window.sendClock : null;

  window.sendClock = function (type) {
    window.missingClockNoticeV62 = null;

    if (typeof originalSendClockV62 === 'function') {
      originalSendClockV62.call(window, type);
    }

    // 不阻擋原本打卡流程；背景查詢後，只負責把紅字提醒補到畫面最上方。
    safeCheckMissingClockNoticeV62();
  };

  const originalSetSendingStatusV62 = typeof window.setSendingStatus === 'function' ? window.setSendingStatus : null;

  window.setSendingStatus = function (type) {
    if (typeof originalSetSendingStatusV62 === 'function') {
      originalSetSendingStatusV62.call(window, type);
    }

    prependMissingClockWarningV62();
  };

  const originalShowClockSuccessV62 = typeof window.showClockSuccess === 'function' ? window.showClockSuccess : null;

  window.showClockSuccess = function (res, type) {
    if (typeof originalShowClockSuccessV62 === 'function') {
      originalShowClockSuccessV62.call(window, res, type);
    }

    prependMissingClockWarningV62();
  };

  const originalSetStatusV62 = typeof window.setStatus === 'function' ? window.setStatus : null;

  window.setStatus = function (text) {
    if (typeof originalSetStatusV62 === 'function') {
      originalSetStatusV62.call(window, text);
    }

    prependMissingClockWarningV62();
  };

  setTimeout(function () {
    try {
      const footer = document.querySelector('.footer');
      if (footer && footer.innerText.indexOf('前端 V62') === -1) {
        footer.innerText = footer.innerText + '｜前端 V62 未打卡提醒';
      }
    } catch (e) {}
  }, 1300);
})();
</script>
