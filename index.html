<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小時候打卡系統</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    /* =====================================================
       日系簡約現代風主題變數與全域設定
       ===================================================== */
    :root {
      --bg-main: #f9fbe7;          /* 日系清新淡米綠背景 */
      --text-main: #2c3e35;        /* 深森林綠文字 */
      --text-muted: #6b7c73;       /* 灰綠次要文字 */
      --primary: #2a4b35;          /* 主色：典雅深綠 */
      --primary-hover: #1e3625;
      --secondary: #6e8477;        /* 輔助色：莫蘭迪灰綠 */
      --card-bg: #ffffff;          /* 純白卡片 */
      --border-color: #e1e8e4;     /* 細緻邊框 */
      --accent-red: #d93025;       /* 警示紅 */
      --accent-red-bg: #fff1f0;
      --accent-green: #1db446;     /* 成功綠 */
      --accent-green-bg: #eef9f0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", "Microsoft JhengHei", Arial, sans-serif;
      background: var(--bg-main);
      color: var(--text-main);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      max-width: 460px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    /* 頂部標頭 */
    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .brand {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--primary);
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 1px;
    }

    /* 卡片容器 */
    .card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 20px rgba(42, 75, 53, 0.04);
      border: 1px solid var(--border-color);
      margin-bottom: 20px;
    }

    /* 狀態顯示區 */
    .status {
      font-size: 15px;
      line-height: 1.7;
      white-space: pre-line;
      word-break: break-word;
      color: var(--text-main);
    }

    .section-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--primary);
      margin: 16px 0 12px;
      border-left: 3px solid var(--primary);
      padding-left: 8px;
    }

    .mini-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-muted);
      margin: 14px 0 6px;
      text-align: left;
    }

    /* 表單元件 */
    input[type="text"],
    input[type="date"],
    input[type="time"],
    input[type="password"],
    select,
    textarea {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border-color);
      font-size: 15px;
      margin-bottom: 12px;
      outline: none;
      background: #fafafa;
      color: var(--text-main);
      font-family: inherit;
      transition: all 0.2s ease;
      display: block;
      -webkit-appearance: none;
      appearance: none;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(42, 75, 53, 0.08);
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    /* 下拉選單文字置中設定 (V59.1) */
    .makeup-center-select-v591 {
      text-align: center !important;
      text-align-last: center !important;
      font-weight: 700 !important;
      color: #1a73e8 !important; /* 保留原本設定的明顯藍色 */
    }
    .makeup-center-select-v591 option { text-align: center !important; }

    /* 按鈕樣式 */
    button {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 14px;
      margin: 6px 0;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-block;
      text-align: center;
    }

    button:active { transform: scale(0.98); }
    button:disabled { background: #cbd5e1 !important; color: #94a3b8 !important; cursor: not-allowed; }

    .btn-main { background: var(--primary); color: #fff; }
    .btn-main:hover { background: var(--primary-hover); }
    .btn-bind { background: var(--secondary); color: #fff; }
    .btn-secondary { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
    .btn-outline { background: #fff; color: var(--primary); border: 1px solid var(--primary); }
    .btn-outline:hover { background: rgba(42, 75, 53, 0.04); }
    .btn-danger { background: var(--accent-red); color: #fff; }

    /* 提示文字 */
    .tips {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.6;
      text-align: center;
      margin-top: 16px;
    }

    /* 隱藏元素 (V63) */
    .footer, .hidden { display: none !important; }

    /* =====================================================
       各類狀態與卡片元件設計
       ===================================================== */
    /* 成功打卡資訊 */
    .success-card { text-align: center; }
    .success-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--accent-green-bg);
      color: var(--accent-green);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: bold;
      margin: 0 auto 12px;
    }
    .success-title { font-size: 18px; font-weight: 700; color: var(--accent-green); margin-bottom: 4px; }
    .success-time { font-size: 32px; font-weight: 700; color: var(--text-main); margin-bottom: 16px; letter-spacing: 1px; }
    
    /* 清單與表格列 */
    .success-list {
      background: #fafafa;
      border-radius: 10px;
      padding: 12px 16px;
      margin: 12px 0;
      border: 1px solid var(--border-color);
    }
    .success-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid #f1f5f9;
      font-size: 14px;
    }
    .success-row:last-child { border-bottom: none; }
    .success-label { color: var(--text-muted); font-weight: 500; }
    .success-value { color: var(--text-main); font-weight: 600; text-align: right; word-break: break-word; }

    /* 溫馨提示區塊 */
    .success-note {
      text-align: left;
      font-size: 13px;
      line-height: 1.6;
      color: #7c5e10;
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: 10px;
      padding: 12px;
      margin: 12px 0;
      white-space: pre-line;
    }
    .form-note { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; text-align: left; }

    /* 定位中閃爍 (V35) */
    .sending-status { background: #fafafa; border-radius: 12px; padding: 16px; border: 1px solid var(--border-color); }
    .sending-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .sending-action { font-size: 18px; font-weight: 700; color: var(--primary); }
    .sending-blink { animation: sendingBlink 0.8s infinite ease-in-out; }
    @keyframes sendingBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* 阻擋與重複打卡 */
    .status-blocked { text-align: center; }
    .status-blocked-icon { font-size: 48px; margin-bottom: 8px; }
    .status-blocked-title { font-size: 18px; font-weight: 700; color: var(--accent-red); margin-bottom: 12px; }
    .status-blocked-message { text-align: left; font-size: 14px; line-height: 1.6; color: var(--text-main); white-space: pre-line; }

    /* 重複補卡閃爍警示 (V48) */
    .replace-warning-title {
      font-size: 18px; font-weight: 700; color: var(--accent-red); margin-bottom: 12px;
      animation: replaceWarningBlinkV48 0.6s infinite ease-in-out;
    }
    @keyframes replaceWarningBlinkV48 { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* 紀錄彙整 Hub 分頁按鈕 */
    .records-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
    .records-tabs button { margin: 0; padding: 10px; font-size: 14px; }
    .record-active { background: var(--primary) !important; color: #fff !important; }
    .record-inactive { background: #f1f5f9 !important; color: var(--primary) !important; border: 1px solid var(--border-color) !important; }
    .status-blocked-message { font-size: 14px; background: #fafafa; padding: 14px; border-radius: 10px; border: 1px solid var(--border-color); }

    /* 錯誤補卡刪除清單 (V59) */
    .makeup-date-warn-v59 { color: var(--accent-red); font-weight: 700; }
    .pending-delete-list-v59 { margin: 12px 0; display: flex; flex-direction: column; gap: 8px; }
    .pending-delete-item-v59 {
      display: flex; align-items: flex-start; gap: 10px; background: #fafafa;
      border: 1px solid var(--border-color); border-radius: 10px; padding: 12px; text-align: left;
    }
    .pending-delete-item-v59 input { width: auto; margin-top: 4px; transform: scale(1.1); }
    .pending-delete-content-v59 { flex: 1; }
    .pending-delete-title-v59 { font-size: 14px; font-weight: 700; color: var(--text-main); margin-bottom: 4px; }
    .pending-delete-meta-v59 { font-size: 12px; line-height: 1.6; color: var(--text-muted); }

    /* 彈出詢問視窗樣式 (V59.1) */
    .delete-confirm-overlay-v591 {
      position: fixed; inset: 0; z-index: 9999; background: rgba(0, 0, 0, 0.4);
      display: flex; align-items: center; justify-content: center; padding: 16px;
    }
    .delete-confirm-box-v591 {
      width: 100%; max-width: 320px; background: #fff; border-radius: 14px; padding: 20px 20px 0; text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }
    .delete-confirm-title-v591 { font-size: 16px; font-weight: 700; color: var(--text-main); margin-bottom: 8px; }
    .delete-confirm-text-v591 { font-size: 14px; line-height: 1.5; color: var(--text-muted); margin-bottom: 16px; }
    .delete-confirm-actions-v591 { display: grid; grid-template-columns: 1fr 1fr; border-top: 1px solid #eee; margin: 0 -20px; }
    .delete-confirm-actions-v591 button { margin: 0; border-radius: 0; background: transparent; padding: 12px; font-size: 15px; }
    .delete-confirm-cancel-v591 { color: var(--text-main) !important; border-right: 1px solid #eee !important; }
    .delete-confirm-ok-v591 { color: var(--accent-green) !important; font-weight: 700; }

    /* 專屬成就區塊 (V60) */
    .achievement-box-v60 {
      margin-top: 20px; padding: 16px; border-radius: 14px;
      background: linear-gradient(180deg, #ffffff 0%, #f9fbf8 100%);
      border: 1px solid var(--border-color); text-align: center;
    }
    .achievement-heading-v60 { font-size: 16px; font-weight: 700; color: var(--primary); margin-bottom: 12px; letter-spacing: 1px; }
    .achievement-loading-text-v60 { font-size: 13px; color: var(--text-muted); }
    .achievement-list-v60 { display: flex; flex-direction: column; gap: 12px; }
    .achievement-card-v60 { overflow: hidden; border-radius: 12px; background: #fff; border: 1px solid var(--border-color); }
    .achievement-img-v60 { display: block; width: 100%; height: auto; }
    .achievement-name-v60 { padding: 10px 10px 2px; font-size: 15px; font-weight: 700; color: var(--text-main); }
    .achievement-note-v60 { padding: 0 10px 10px; font-size: 12px; color: var(--text-muted); }

    /* 本月未打卡警告紅框 (V62/V70) */
    .missing-clock-warning-v62 {
      color: var(--accent-red); background: var(--accent-red-bg);
      border: 1px solid rgba(217, 48, 37, 0.25); border-radius: 10px;
      padding: 10px; margin-bottom: 16px; font-size: 14px; font-weight: 700;
      line-height: 1.5; text-align: center; white-space: pre-line !important;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="header">
      <div class="brand">小時候打卡系統</div>
      <div class="subtitle">員工上下班・休息紀錄</div>
    </div>

    <div class="card">
      <div id="status" class="status">系統載入中...</div>

      <div id="bindBox" class="hidden">
        <div class="section-title">第一次使用｜綁定員工UID</div>
        <input id="employeeId" type="text" placeholder="請輸入員工UID (電話號碼)">
        <button class="btn-bind" onclick="bindEmployee()">綁定員工資料</button>
      </div>

      <div id="homeBox" class="hidden">
        <div class="section-title">請從 LINE 下方選單操作</div>
        <button class="btn-main" onclick="sendClock('上班打卡')">上班打卡</button>
        <button class="btn-main" onclick="sendClock('下班打卡')">下班打卡</button>
        <button class="btn-main" onclick="sendClock('休息開始')">開始休息</button>
        <button class="btn-main" onclick="sendClock('休息結束')">結束休息</button>
        <button class="btn-outline" onclick="showMakeupPage()">忘記打卡 / 補卡申請</button>
        <button class="btn-outline" onclick="showRecordsHub('month')">打卡紀錄</button>
      </div>

      <div class="tips">打卡時會使用手機定位確認是否在分店範圍內</div>
    </div>

    <div class="footer">LIFF ID：2010226307-AZeYYFbb｜前端 V70 整合優化版</div>
  </div>

  <script>
    const LIFF_ID = '2010226307-AZeYYFbb';
    const API_URL = 'https://script.google.com/macros/s/AKfycbyMjNZ6Tzl7cm6v43JYrbI5UCnQcwdqMG9bfJ3sv5HDkgKPe6yDnF1khfJu4asbrFjc/exec';
    const PENDING_TEXT = '待審核 (太久沒通過,請聯繫主管)';

    let lineUserId = '';
    let lineDisplayName = '';
    let lastActionType = '';
    let lastBreakFixRowKey = '';
    
    // V35/V45/V47 全域快取承載參數
    let pendingMakeupReplacePayloadGlobal = null;
    let pendingDeleteRowIndexesV591 = [];
    let missingClockNoticeGlobal = null;
    let missingClockRequestSerial = 0;

    // 系統初始化啟動
    window.onload = async function () {
      setStatus('正在啟動打卡系統...');
      try {
        if (typeof liff === 'undefined') {
          setStatus('LIFF SDK 載入失敗，請重新開啟 LINE');
          return;
        }
        await liff.init({ liffId: LIFF_ID, withLoginOnExternalBrowser: true });
        if (!liff.isLoggedIn()) {
          setStatus('尚未登入 LINE，正在前往登入...');
          liff.login();
          return;
        }
        const profile = await liff.getProfile();
        lineUserId = profile.userId;
        lineDisplayName = profile.displayName;
        handleRoute();
      } catch (err) {
        setStatus('初始化失敗\n\n錯誤訊息：' + err.message + '\n\n請確認 LIFF 設定是否有誤。');
      }
    };

    // 路由與外連參數分流控制 (整合 V52, V55, V57)
    function handleRoute() {
      const action = getUrlParam('action');
      hideAllBoxes();

      if (action === 'workIn') { sendClock('上班打卡'); return; }
      if (action === 'workOut') { sendClock('下班打卡'); return; }
      if (action === 'breakStart') { sendClock('休息開始'); return; }
      if (action === 'breakEnd') { sendClock('休息結束'); return; }
      if (action === 'monthRecords' || action === 'makeup' || action === 'forgetClock') { showMakeupPage(); return; }
      if (action === 'historyRecords' || action === 'records') { showRecordsHub('month'); return; }
      if (action === 'adminPunch' || action === 'adminProxy' || action === 'proxyPunch' || action === 'adminProxyClock') { showAdminProxyAccessGateV52(); return; }
      if (action === 'pendingReview' || action === 'supervisorApproval' || action === 'makeupApproval' || action === 'reviewMakeup') { showPendingReviewPageV55(); return; }
      if (action === 'newEmployee' || action === 'newStaff' || action === 'createEmployee') { showNewEmployeePageV57(); return; }

      document.getElementById('homeBox').classList.remove('hidden');
      setStatus('LINE 身分取得成功\nLINE 名稱：' + lineDisplayName + '\n\n請從 LINE 下方選單選擇打卡項目');
    }

    /* =====================================================
       核心邏輯封裝函式組 (時間處理、API 呼叫與基礎工具)
       ===================================================== */
    function isPendingTextCheck(value) {
      const text = String(value || '').trim();
      if (!text) return false;
      return (text.indexOf('待審核') !== -1 || text.indexOf('送審中') !== -1 || text.indexOf('補卡') !== -1);
    }

    function formatTime(timeText) {
      const raw = String(timeText || '').trim();
      if (isPendingTextCheck(raw)) return PENDING_TEXT;
      const parsed = parseTimeParts(raw);
      return parsed ? pad2(parsed.h) + ':' + pad2(parsed.m) : '-';
    }

    function formatTimeWithSeconds(timeText) {
      const raw = String(timeText || '').trim();
      if (isPendingTextCheck(raw)) return PENDING_TEXT;
      const parsed = parseTimeParts(raw);
      return parsed ? pad2(parsed.h) + ':' + pad2(parsed.m) + ':' + pad2(parsed.s) : '-';
    }

    function parseTimeParts(timeText) {
      if (!timeText) return null;
      const match = String(timeText).trim().match(/(\d{1,2})\s*:\s*(\d{1,2})(?:\s*:\s*(\d{1,2}))?/);
      if (!match) return null;
      return { h: parseInt(match[1], 10), m: parseInt(match[2], 10), s: match[3] !== undefined ? parseInt(match[3], 10) : 0 };
    }

    function calcWorkHours(workIn, workOut, breakStart, breakEnd) {
      const inMin = roundedTimeToMinutes(workIn);
      const outMin = roundedTimeToMinutes(workOut);
      if (inMin === null || outMin === null) return '';
      let total = outMin - inMin;
      if (total < 0) total += 24 * 60;

      const bsMin = roundedTimeToMinutes(breakStart);
      const beMin = roundedTimeToMinutes(breakEnd);
      if (bsMin !== null && beMin !== null) {
        let breakTotal = beMin - bsMin;
        if (breakTotal < 0) breakTotal += 24 * 60;
        total -= breakTotal;
      }
      return total < 0 ? 0 : Math.round((total / 60) * 100) / 100;
    }

    function roundedTimeToMinutes(timeText) {
      const parsed = parseTimeParts(timeText);
      if (!parsed) return null;
      let h = parsed.h; const m = parsed.m;
      let roundedMinute = 0;
      if (m >= 0 && m <= 15) roundedMinute = 0;
      else if (m >= 16 && m <= 45) roundedMinute = 30;
      else if (m >= 46 && m <= 59) { h += 1; roundedMinute = 0; }
      return h * 60 + roundedMinute;
    }

    function apiCall(params, callback) {
      const cbName = 'jsonpCallback_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
      params.callback = cbName;
      params._t = Date.now();
      const query = Object.keys(params).map(k => encodeURIComponent(k) + '=' + encodeURIComponent(params[k])).join('&');
      const script = document.createElement('script');
      script.src = API_URL + '?' + query;

      let timer = setTimeout(function () {
        cleanup(); setButtons(true);
        setStatus('連線逾時，請檢查網路或系統權限。');
      }, 15000);

      window[cbName] = function (res) { cleanup(); callback(res); };
      script.onerror = function () { cleanup(); setButtons(true); setStatus('無法連接打卡伺服器，請重新開起畫面。'); };

      function cleanup() { clearTimeout(timer); delete window[cbName]; if (script.parentNode) script.parentNode.removeChild(script); }
      document.body.appendChild(script);
    }

    function getUrlParam(name) { return new URLSearchParams(window.location.search).get(name); }
    function hideAllBoxes() { document.getElementById('bindBox').classList.add('hidden'); document.getElementById('homeBox').classList.add('hidden'); }
    function pad2(num) { return String(num).padStart(2, '0'); }
    function formatHour(val) { const n = parseFloat(val || 0); return isNaN(n) ? '0' : Number(n.toFixed(2)).toString(); }
    function getField(obj, keys) { for (let i = 0; i < keys.length; i++) { if (obj && obj[keys[i]] !== undefined && obj[keys[i]] !== null) return String(obj[keys[i]]).trim(); } return ''; }
    function getTodaySheetDate() { const d = new Date(); return d.getFullYear() + '/' + pad2(d.getMonth() + 1) + '/' + pad2(d.getDate()); }
    function getCurrentTimeText() { const d = new Date(); return pad2(d.getHours()) + ':' + pad2(d.getMinutes()); }
    function makeSuccessRowHtml(label, value) { return '<div class="success-row"><div class="success-label">' + escapeHtml(label) + '</div><div class="success-value">' + escapeHtml(value) + '</div></div>'; }
    function escapeHtml(text) { return String(text || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;'); }
    function setButtons(enabled) { document.querySelectorAll('button').forEach(btn => { btn.disabled = !enabled; }); }
    
    function setStatus(text) {
      const statusBox = document.getElementById('status');
      const msg = String(text || '');
      if (msg.indexOf('已經有紀錄') !== -1 || msg.indexOf('系統已阻擋') !== -1 || msg.indexOf('避免覆蓋原本資料') !== -1) {
        statusBox.innerHTML = '<div class="status-blocked"><div class="status-blocked-icon">❌</div><div class="status-blocked-title">重複打卡已阻擋</div><div class="status-blocked-message">' + escapeHtml(msg) + '</div></div>';
        return;
      }
      statusBox.innerText = msg;
      prependMissingClockWarningV70();
    }

    function closeLiffNow() {
      try { if (typeof liff !== 'undefined' && liff.isInClient()) { liff.closeWindow(); return; } } catch (e) {}
      setStatus('打卡已完成，可以手動關閉此頁面。');
    }

    function setSendingStatus(type) {
      document.getElementById('status').innerHTML = '<div class="sending-status"><div class="sending-title">定位成功</div><div class="sending-action sending-blink">正在送出：' + escapeHtml(type) + '</div></div>';
      prependMissingClockWarningV70();

    function startGeoClock(type) {
      setButtons(false); setStatus('正在取得手機定位...\n請允許定位權限');
      if (!navigator.geolocation) { setButtons(true); setStatus('此手機不支援定位功能'); return; }
      
      navigator.geolocation.getCurrentPosition(
        function (position) {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;
          setSendingStatus(type);

          apiCall({ action: 'clockIn', userId: lineUserId, type: type, lat: lat, lng: lng }, function (res) {
            setButtons(true);
            if (res.ok) { showClockSuccess(res, type); } 
            else {
              if (String(res.message || '').includes('尚未綁定')) { showBindRequired(type); } 
              else { setStatus(res.message || '打卡失敗'); }
            }
          });
        },
        function (error) {
          setButtons(true);
          let msg = '定位失敗';
          if (error.code === 1) msg = '你拒絕了定位權限，無法打卡';
          else if (error.code === 2) msg = '無法取得目前位置';
          else if (error.code === 3) msg = '定位逾時，請再試一次';
          setStatus(msg);
        },
        { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
      );
    }

    function renderRecordsPage(mode, records) {
      const statusBox = document.getElementById('status');

      const text = formatGroupedRecordsTextV32(title, records);

      statusBox.innerHTML = '<div class="records-tabs"><button class="' + (mode === 'month' ? 'record-active' : 'record-inactive') + '" onclick="showRecordsHub(\'month\')">本月紀錄</button><button class="' + (mode === 'history' ? 'record-active' : 'record-inactive') + '" onclick="showRecordsHub(\'history\')">歷史紀錄</button></div><div class="status-blocked-message">' + escapeHtml(text) + '</div>';

      prepareAchievementAreaV60();

    function formatGroupedRecordsTextV32(title, records) {
      records = (records || []).filter(r => {
        const res = getField(r, ['result', '狀態']);
        const time = getField(r, ['time', '時間']);
        return (res === '成功' || res === '補卡' || res === '待審核' || res === '送審中' || isPendingTextCheck(time));
      });
      if (records.length === 0) return title + '\n\n目前沒有紀錄';

      const map = {};
      records.forEach(r => {
        const date = getField(r, ['date', '日期']);
        const store = getField(r, ['store', '分店']);
        const type = getField(r, ['type', '類型', '動作']);
        let time = getField(r, ['time', '時間']);
        const result = getField(r, ['result', '狀態']);

        if (isPendingTextCheck(time) || isPendingTextCheck(result)) { time = PENDING_TEXT; }
        const key = date + '_' + store;
        if (!map[key]) {
          map[key] = { date: date, store: store, workIn: '', breakStart: '', breakEnd: '', workOut: '', hours: '' };
        }
        if (type === '上班打卡') map[key].workIn = time;
        else if (type === '休息開始') map[key].breakStart = time;
        else if (type === '休息結束') map[key].breakEnd = time;
        else if (type === '下班打卡') map[key].workOut = time;
      });

      const days = Object.values(map).sort((a, b) => String(b.date).localeCompare(String(a.date)));
      let workDaySet = new Set(), totalHours = 0;

      days.forEach(d => {
        const hasPending = [d.workIn, d.breakStart, d.breakEnd, d.workOut].some(isPendingTextCheck);
        if (d.workIn || d.workOut) workDaySet.add(String(d.date).trim());
        if (!hasPending && d.workIn && d.workOut) { d.hours = calcWorkHours(d.workIn, d.workOut, d.breakStart, d.breakEnd); }
        const h = parseFloat(d.hours);
        if (!isNaN(h)) totalHours += h;
      });

      let text = title + '\n\n上班天數：' + workDaySet.size + ' 天\n總工時：' + formatHour(totalHours) + ' 小時\n\n';
      days.forEach((d, idx) => {
        text += (idx + 1) + '. ' + (d.date || '-') + '\n分店：' + (d.store || '-') + '\n上班打卡：' + formatTime(d.workIn) + '\n休息開始：' + formatTime(d.breakStart) + '\n休息結束：' + formatTime(d.breakEnd) + '\n下班打卡：' + formatTime(d.workOut) + '\n工時：' + (d.hours !== '' ? formatHour(d.hours) + ' 小時' : '-') + '\n\n';
      });
      return text.trim();
    }

    function collectMakeupPayload() {
      const d = document.getElementById('makeupDate');
      const s = document.getElementById('makeupStore');
      const t = document.getElementById('makeupType');
      const tm = document.getElementById('makeupTime');
      const r = document.getElementById('makeupReason');
      if (d || s || t || tm || r) {
        return {
          date: d ? String(d.value || '').replace(/-/g, '/') : '',
          store: s ? s.value : '',
          type: t ? t.value : '',
          time: tm ? tm.value : '',
          reason: r ? r.value.trim() : ''
        };
      }
      return Object.assign({}, pendingMakeupReplacePayloadGlobal || {});
    }

    function submitMakeupRequest(replacePending) {
      replacePending = (replacePending === true);
      const payload = collectMakeupPayload();
      
      if (!payload.date || !payload.store || !payload.type || !payload.time || !payload.reason) {
        setStatus('補卡資料不完整，請確認日期、分店、類型、時間與原因。'); return;
      }
      pendingMakeupReplacePayloadGlobal = payload;

      setButtons(false);
      setStatus(replacePending ? '正在取代上一筆補卡申請...' : '正在送出補卡申請...');

      apiCall({
        action: 'submitMakeupRequest', userId: lineUserId,
        date: payload.date, store: payload.store, type: payload.type, time: payload.time, reason: payload.reason,
        replacePending: replacePending ? 'true' : 'false',
        forceReplacePending: replacePending ? 'YES' : 'NO',
        confirmReplace: replacePending ? 'true' : 'false',
        replaceConfirm: replacePending ? 'true' : 'false',
        overridePending: replacePending ? '1' : '0',
        replace: replacePending ? 'replace' : '',
        mode: replacePending ? 'replace' : '',
        replaceRequest: replacePending ? 'true' : 'false',
        replaceAction: replacePending ? 'CONFIRM_REPLACE_V47' : '',
        replaceToken: replacePending ? 'REPLACE_NOW_V47' : '',
        frontendVersion: 'V45_REPLACE_CONFIRM_FORCE'
      }, function (res) {
        setButtons(true); res = res || {};
        const msg = String(res.message || '');
        const code = String(res.code || '');

        const needsReplace = (res.replaceRequired || res.needReplace || res.need_replace || code === 'REPLACE_PENDING_MAKEUP' || msg.indexOf('同類型補卡') !== -1 || msg.indexOf('取代剛才') !== -1);

        if (needsReplace) {
          if (replacePending) {
            setStatus('取代失敗：後端仍要求取代確認。\n請確認 GAS 伺服器部署部署網址是否同步更新。'); return;
          }
          showReplacePendingMakeupConfirm(res); return;
        }

        if (!res.ok) {
          if (code === 'EXISTING_CLOCK_RECORD') {
            document.getElementById('status').innerHTML = '<div class="status-blocked"><div class="status-blocked-icon">❌</div><div class="status-blocked-title">不能送出補卡</div><div class="status-blocked-message">' + escapeHtml(res.message || '這個類型已經有正式打卡紀錄，不能再補卡。') + '</div><div class="success-actions"><button class="btn-outline" onclick="showMakeupPage()">返回補卡頁面</button><button class="btn-secondary" onclick="closeLiffNow()">關閉畫面</button></div></div>';
            return;
          }
          if (msg.includes('尚未綁定')) { showBindRequired('忘記打卡'); } else { setStatus(msg || '補卡申請送出失敗'); }
          return;
        }
        
        pendingMakeupReplacePayloadGlobal = null;
        showMakeupSubmitted(res);
      });
    }

    function showReplacePendingMakeupConfirm(res) {
      const payload = Object.assign({}, pendingMakeupReplacePayloadGlobal || {});
      const replaceInfo = res.replaceInfo || {};
      const prev = replaceInfo.previous || {};

    /* =====================================================
       本月未打卡提醒與安全稽核監聽組 (整合 V62, V70)
       ===================================================== */
    function checkCurrentMonthMissingClockV70() {
      if (!lineUserId || !API_URL) return;
      const serial = ++missingClockRequestSerial;
      const cbName = 'missingClockCallbackV70_' + Date.now() + '_' + Math.floor(Math.random() * 100000);

      apiCall({
        action: 'checkMissingClockRecords', userId: lineUserId, callback: cbName,
        frontendPatch: 'V70_CURRENT_MONTH_MISSING_DATES', currentMonthOnly: 'true', includeMissingDates: 'true'
      }, function (res) {
        if (serial !== missingClockRequestSerial) return;
        
        let uniqueDates = [];
        if (res && res.ok) {
          const currentMonthStr = (new Date()).getFullYear() + '/' + String((new Date()).getMonth() + 1).padStart(2, '0');
          const rawRecords = res.records || res.missingRecords || res.missingDates || res.dates || [];
          const uMap = {};
          
          rawRecords.forEach(item => {
            let rDate = typeof item === 'string' ? item : (item?.date || item?.missingDate || '');
            const m = rDate.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
            if (m) {
              const formatted = m[1] + '/' + String(m[2]).padStart(2, '0') + '/' + String(m[3]).padStart(2, '0');
              if (formatted.indexOf(currentMonthStr + '/') === 0) uMap[formatted] = true;
            }
          });
          uniqueDates = Object.keys(uMap).sort();
        }

        if (uniqueDates.length > 0) {
          window.missingClockNoticeV70 = { hasMissing: true, dates: uniqueDates };
        } else {
          window.missingClockNoticeV70 = null;
        }
        prependMissingClockWarningV70();
      });
    }

    function removeMissingClockWarningsV70() {
      document.querySelectorAll('.missing-clock-warning-v62').forEach(el => el.remove());
    }

    function prependMissingClockWarningV70() {
      const statusBox = document.getElementById('status');
      if (!statusBox) return;
      removeMissingClockWarningsV70();

      if (window.missingClockNoticeV70 && window.missingClockNoticeV70.dates?.length > 0) {
        let text = '有未打卡紀錄\n請查看打卡紀錄 並補卡!\n補卡完畢請告知主管';
        text += '\n' + window.missingClockNoticeV70.dates.map(d => d + ' 有未打卡').join('\n');
        
        statusBox.insertAdjacentHTML('afterbegin', '<div class="missing-clock-warning-v62">' + escapeHtml(text) + '</div>');
      }
    }
  </script>
</body>
