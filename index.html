<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>員工打卡系統</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: "Microsoft JhengHei", Arial, sans-serif;
      background: #f3f5f7;
      color: #222;
    }

    .card {
      max-width: 460px;
      margin: 30px auto;
      background: white;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    h1 {
      text-align: center;
      font-size: 26px;
      margin-bottom: 8px;
    }

    .sub {
      text-align: center;
      color: #666;
      margin-bottom: 18px;
    }

    .status {
      background: #f7f7f7;
      border-radius: 12px;
      padding: 14px;
      line-height: 1.8;
      white-space: pre-line;
      word-break: break-word;
      margin-bottom: 14px;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #ddd;
      font-size: 16px;
      margin-bottom: 10px;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 15px;
      margin: 7px 0;
      font-size: 17px;
      font-weight: bold;
      color: white;
      background: #06C755;
    }

    .break {
      background: #2d8cff;
    }

    .off {
      background: #ff6b35;
    }

    .secondary {
      background: #333;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>員工打卡系統</h1>
    <div class="sub">小時候彈珠堂</div>

    <div id="status" class="status">頁面載入中...</div>

    <div id="bindBox" class="hidden">
      <input id="employeeId" type="text" placeholder="請輸入員工ID，例如 E001">
      <button onclick="bindEmployee()">綁定員工資料</button>
    </div>

    <div id="clockBox" class="hidden">
      <button onclick="sendClock('上班打卡')">上班打卡</button>
      <button class="break" onclick="sendClock('休息開始')">休息開始</button>
      <button class="break" onclick="sendClock('休息結束')">休息結束</button>
      <button class="off" onclick="sendClock('下班打卡')">下班打卡</button>
      <button class="secondary" onclick="getToday()">查看今日紀錄</button>
    </div>
  </div>

  <script>
    const LIFF_ID = '2010226307-AZeYYFbb';

    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzuwS1iN6m_mffBen4mMTICTJTaIqAPjsl0W74ikqbJrGcPTOdIswgzvfQAqw1Dx0s/exec';

    let lineUserId = '';
    let lineDisplayName = '';

    window.onload = async function () {
      setStatus('GitHub Pages 已載入\n正在初始化 LIFF...');

      try {
        if (typeof liff === 'undefined') {
          setStatus('LIFF SDK 載入失敗');
          return;
        }

        await liff.init({
          liffId: LIFF_ID,
          withLoginOnExternalBrowser: true
        });

        if (!liff.isLoggedIn()) {
          setStatus('尚未登入 LINE，正在登入...');
          liff.login();
          return;
        }

        const profile = await liff.getProfile();

        lineUserId = profile.userId;
        lineDisplayName = profile.displayName;

        setStatus(
          'LINE 身分取得成功\n' +
          'LINE 名稱：' + lineDisplayName + '\n\n' +
          '請輸入員工ID綁定，或直接打卡'
        );

        document.getElementById('bindBox').classList.remove('hidden');
        document.getElementById('clockBox').classList.remove('hidden');

      } catch (err) {
        setStatus('LIFF 初始化失敗：' + err.message);
      }
    };

    function bindEmployee() {
      const employeeId = document.getElementById('employeeId').value.trim();

      if (!employeeId) {
        setStatus('請先輸入員工ID');
        return;
      }

      setStatus('正在綁定員工資料...');

      apiCall({
        action: 'bindEmployee',
        userId: lineUserId,
        employeeId: employeeId
      }, function (res) {
        if (res.ok) {
          setStatus(
            '綁定成功\n' +
            '姓名：' + res.name + '\n' +
            '分店：' + res.store
          );
        } else {
          setStatus(res.message);
        }
      });
    }

    function sendClock(type) {
      setStatus('正在取得手機定位...\n請允許定位權限');

      if (!navigator.geolocation) {
        setStatus('此手機不支援定位功能');
        return;
      }

      navigator.geolocation.getCurrentPosition(
        function (position) {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;

          setStatus('定位成功，正在送出：' + type);

          apiCall({
            action: 'clockIn',
            userId: lineUserId,
            type: type,
            lat: lat,
            lng: lng
          }, function (res) {
            if (res.ok) {
              setStatus(
                res.message + '\n\n' +
                '姓名：' + res.name + '\n' +
                '分店：' + res.store + '\n' +
                '日期：' + res.date + '\n' +
                '時間：' + res.time
              );
            } else {
              setStatus(res.message);
            }
          });
        },
        function (error) {
          if (error.code === 1) setStatus('你拒絕了定位權限，無法打卡');
          else if (error.code === 2) setStatus('無法取得目前位置');
          else if (error.code === 3) setStatus('定位逾時，請再試一次');
          else setStatus('定位失敗');
        },
        {
          enableHighAccuracy: true,
          timeout: 15000,
          maximumAge: 0
        }
      );
    }

    function getToday() {
      setStatus('正在查詢今日紀錄...');

      apiCall({
        action: 'getToday',
        userId: lineUserId
      }, function (res) {
        if (!res.ok) {
          setStatus(res.message);
          return;
        }

        if (!res.records || res.records.length === 0) {
          setStatus('今日尚無打卡紀錄');
          return;
        }

        let text = '今日紀錄\n';
        text += '姓名：' + res.name + '\n';
        text += '日期：' + res.date + '\n\n';

        res.records.forEach(function (r) {
          text += r.time + '　' + r.type + '　' + r.result + '\n';
        });

        setStatus(text);
      });
    }

    function apiCall(params, callback) {
      const cbName = 'jsonpCallback_' + Date.now() + '_' + Math.floor(Math.random() * 100000);

      params.callback = cbName;

      const query = Object.keys(params)
        .map(function (key) {
          return encodeURIComponent(key) + '=' + encodeURIComponent(params[key]);
        })
        .join('&');

      const script = document.createElement('script');
      script.src = GAS_URL + '?' + query;

      window[cbName] = function (res) {
        delete window[cbName];
        if (script.parentNode) {
          script.parentNode.removeChild(script);
        }
        callback(res);
      };

      script.onerror = function () {
        setStatus('無法連接 Google Apps Script API');
      };

      document.body.appendChild(script);
    }

    function setStatus(text) {
      document.getElementById('status').innerText = text;
    }
  </script>
</body>
</html>
